<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة البطل - GitHub Game</title>
    <style>
        /* تنسيق الواجهة */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            border: 5px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas { 
            display: block; 
            background-color: #87CEEB; /* لون سماء احتياطي */
        }

        /* شاشة البداية والنهاية */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 { font-size: 50px; margin-bottom: 10px; color: #ffcc00; text-shadow: 3px 3px #333; }
        p { font-size: 18px; margin-bottom: 20px; }

        button {
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        button:hover { background-color: #218838; transform: scale(1.1); }

        #score-tag {
            position: absolute;
            top: 10px; right: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 5;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 5px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-tag">النقاط: 0</div>

        <div id="start-screen" class="overlay">
            <h1>مغامرة البطل</h1>
            <p>استخدم "المسافة" (Space) للقفز وتجنب الوحوش!</p>
            <button onclick="startGame()">ابدأ اللعب</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1>انتهت اللعبة!</h1>
            <p id="final-score">نقاطك النهائية: 0</p>
            <button onclick="restartGame()">حاول مرة أخرى</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // تحميل الصور (استخدام الصور التي طلبتها)
        const playerImg = new Image();
        playerImg.src = "http://googleusercontent.com/image_collection/image_retrieval/3662735799481297525";

        const monsterImg = new Image();
        monsterImg.src = "http://googleusercontent.com/image_collection/image_retrieval/338491737330207506";

        const backgroundImg = new Image();
        backgroundImg.src = "http://googleusercontent.com/image_collection/image_retrieval/13333584163346876678";

        // متغيرات اللعبة
        let gameRunning = false;
        let score = 0;
        let player = { x: 80, y: 300, w: 60, h: 60, dy: 0, jump: -15, grav: 0.8, grounded: false };
        let obstacles = [];
        let bgX = 0;
        let frame = 0;

        function startGame() {
            document.getElementById("start-screen").classList.add("hidden");
            gameRunning = true;
            resetVariables();
            update();
        }

        function restartGame() {
            document.getElementById("game-over-screen").classList.add("hidden");
            gameRunning = true;
            resetVariables();
            update();
        }

        function resetVariables() {
            score = 0;
            obstacles = [];
            player.y = 300;
            player.dy = 0;
            frame = 0;
            document.getElementById("score-tag").innerText = "النقاط: 0";
        }

        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frame++;

            // 1. رسم وتحريك الخلفية (تأثير التمرير)
            bgX -= 2;
            if (bgX <= -canvas.width) bgX = 0;
            ctx.drawImage(backgroundImg, bgX, 0, canvas.width, canvas.height);
            ctx.drawImage(backgroundImg, bgX + canvas.width, 0, canvas.width, canvas.height);

            // 2. حركة اللاعب والجاذبية
            player.dy += player.grav;
            player.y += player.dy;

            if (player.y > 300) {
                player.y = 300;
                player.dy = 0;
                player.grounded = true;
            }

            // رسم البطل (شخصية)
            ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

            // 3. إدارة العقبات (الوحوش)
            if (frame % 120 === 0) {
                obstacles.push({ x: canvas.width, y: 310, w: 50, h: 50 });
            }

            obstacles.forEach((obs, i) => {
                obs.x -= 6; // سرعة الوحوش
                
                // رسم الوحش (شخصية)
                ctx.drawImage(monsterImg, obs.x, obs.y, obs.w, obs.h);

                // فحص الاصطدام
                if (player.x < obs.x + obs.w - 10 && player.x + player.w - 10 > obs.x &&
                    player.y < obs.y + obs.h - 10 && player.y + player.h - 10 > obs.y) {
                    endGame();
                }

                // النقاط
                if (obs.x + obs.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById("score-tag").innerText = "النقاط: " + score;
                }
            });

            requestAnimationFrame(update);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById("game-over-screen").classList.remove("hidden");
            document.getElementById("final-score").innerText = "نقاطك النهائية: " + score;
        }

        // التحكم بالقفز
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && player.grounded && gameRunning) {
                player.dy = player.jump;
                player.grounded = false;
            }
        });

        // لضمان عمل الصور قبل البدء
        window.onload = () => {
            console.log("اللعبة جاهزة!");
        };
    </script>
</body>
</html>

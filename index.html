<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة البطل - نسخة مضمونة</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; 
            align-items: center; height: 100vh; background-color: #111; 
            font-family: 'Segoe UI', Arial, sans-serif; color: white; overflow: hidden;
        }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #444; }
        canvas { display: block; background-color: #87CEEB; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        h1 { font-size: 45px; margin-bottom: 10px; color: #ffcc00; text-shadow: 2px 2px #000; }
        button {
            padding: 12px 35px; font-size: 20px; cursor: pointer;
            background-color: #28a745; color: white; border: none; border-radius: 8px;
        }
        #score-tag {
            position: absolute; top: 15px; right: 20px; font-size: 22px;
            z-index: 5; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 5px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-tag">النقاط: 0</div>

        <div id="start-screen" class="overlay">
            <h1>مغامرة البطل</h1>
            <p>اضغط "المسافة" للقفز وتفادي الوحوش الحمراء</p>
            <button onclick="startGame()">ابدأ اللعب الآن</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1>لقد خسرت!</h1>
            <p id="final-score">نقاطك: 0</p>
            <button onclick="startGame()">إعادة المحاولة</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let gameRunning = false;
        let score = 0;
        let frame = 0;
        let obstacles = [];
        let player = { x: 80, y: 300, w: 40, h: 40, dy: 0, jump: -15, grav: 0.8, grounded: false };

        function startGame() {
            document.getElementById("start-screen").classList.add("hidden");
            document.getElementById("game-over-screen").classList.add("hidden");
            score = 0;
            obstacles = [];
            player.y = 300;
            player.dy = 0;
            frame = 0;
            gameRunning = true;
            document.getElementById("score-tag").innerText = "النقاط: 0";
            update();
        }

        function drawPlayer(x, y) {
            // رسم جسم اللاعب (بطل أخضر)
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(x, y, 40, 40);
            // رسم عين
            ctx.fillStyle = "white";
            ctx.fillRect(x + 25, y + 5, 10, 10);
            ctx.fillStyle = "black";
            ctx.fillRect(x + 30, y + 8, 5, 5);
        }

        function drawMonster(x, y) {
            // رسم وحش أحمر بقرون
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(x, y, 40, 40);
            // قرون
            ctx.beginPath();
            ctx.moveTo(x, y); ctx.lineTo(x-10, y-10); ctx.lineTo(x+10, y);
            ctx.fill();
            // عين شريرة
            ctx.fillStyle = "yellow";
            ctx.fillRect(x + 5, y + 10, 8, 8);
        }

        function update() {
            if (!gameRunning) return;

            // مسح الشاشة ورسم الأرض
            ctx.fillStyle = "#87CEEB"; // سماء
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#7ed6df"; // أرضية بسيطة
            ctx.fillRect(0, 340, canvas.width, 60);

            frame++;

            // حركة اللاعب
            player.dy += player.grav;
            player.y += player.dy;

            if (player.y > 300) {
                player.y = 300;
                player.dy = 0;
                player.grounded = true;
            }

            drawPlayer(player.x, player.y);

            // إدارة العقبات
            if (frame % 90 === 0) {
                obstacles.push({ x: canvas.width, y: 300, w: 40, h: 40 });
            }

            obstacles.forEach((obs, i) => {
                obs.x -= 7;
                drawMonster(obs.x, obs.y);

                // فحص الاصطدام
                if (player.x < obs.x + 30 && player.x + 30 > obs.x &&
                    player.y < obs.y + 30 && player.y + 30 > obs.y) {
                    gameRunning = false;
                    document.getElementById("game-over-screen").classList.remove("hidden");
                    document.getElementById("final-score").innerText = "نقاطك: " + score;
                }

                if (obs.x + obs.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById("score-tag").innerText = "النقاط: " + score;
                }
            });

            requestAnimationFrame(update);
        }

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && player.grounded && gameRunning) {
                player.dy = player.jump;
                player.grounded = false;
            }
        });
    </script>
</body>
</html>

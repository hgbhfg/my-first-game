<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carthage Legends | أساطير قرطاج</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #fbbf24;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', system-ui, -apple-system;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        #game-wrapper {
            position: relative; width: 900px; height: 500px;
            border-radius: 24px; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* UI Overlays */
        .overlay {
            position: absolute; inset: 0; 
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .menu-card {
            background: var(--glass); padding: 40px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2); text-align: center; max-width: 500px;
        }
        h1 { font-size: 42px; margin-bottom: 10px; background: linear-gradient(to left, #818cf8, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .char-select { display: flex; gap: 20px; margin: 30px 0; }
        .hero-option {
            padding: 15px; border-radius: 16px; background: rgba(255,255,255,0.05);
            border: 2px solid transparent; cursor: pointer; transition: 0.3s; width: 120px;
        }
        .hero-option:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); }
        .hero-option.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.2); }
        .hero-ico { width: 40px; height: 40px; border-radius: 8px; margin: 0 auto 10px; }

        .btn-play {
            background: var(--primary); color: white; border: none;
            padding: 16px 60px; border-radius: 12px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            transition: 0.3s;
        }
        .btn-play:hover { transform: scale(1.05); filter: brightness(1.1); }

        #game-stats {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 50;
        }
        .stat-badge {
            background: var(--glass); padding: 8px 20px; border-radius: 12px;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
            font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-stats">
            <div class="stat-badge">HP: <span id="hp-val">100</span>%</div>
            <div class="stat-badge">النقاط: <span id="score-val">0</span></div>
            <div class="stat-badge">المستوى: <span id="level-name">غابة الأسرار</span></div>
        </div>

        <!-- القائمة الرئيسية -->
        <div id="start-screen" class="overlay">
            <div class="menu-card">
                <h1>أساطير قرطاج</h1>
                <p>اختر بطلك للبدء في المغامرة</p>
                <div class="char-select">
                    <div class="hero-option active" onclick="selectHero(0)">
                        <div class="hero-ico" style="background: #6366f1;"></div>
                        <span>ألكسندر</span>
                        <div style="font-size: 10px; color: #94a3b8;">متوازن</div>
                    </div>
                    <div class="hero-option" onclick="selectHero(1)">
                        <div class="hero-ico" style="background: #f43f5e;"></div>
                        <span>سارة</span>
                        <div style="font-size: 10px; color: #94a3b8;">سريعة جداً</div>
                    </div>
                    <div class="hero-option" onclick="selectHero(2)">
                        <div class="hero-ico" style="background: #fbbf24;"></div>
                        <span>ماكس</span>
                        <div style="font-size: 10px; color: #94a3b8;">قفز مزدوج</div>
                    </div>
                </div>
                <button class="btn-play" onclick="startGame()">انطلاق</button>
            </div>
        </div>

        <!-- شاشة النهاية -->
        <div id="over-screen" class="overlay hidden">
            <div class="menu-card">
                <h2 id="over-title">انتهت الرحلة</h2>
                <p id="over-msg"></p>
                <button class="btn-play" onclick="location.reload()">محاولة أخرى</button>
            </div>
        </div>

        <canvas id="stage"></canvas>
    </div>

<script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    canvas.width = 900; canvas.height = 500;

    const game = {
        active: false,
        score: 0,
        hp: 100,
        gravity: 0.6,
        frame: 0,
        level: 1,
        selectedHero: 0
    };

    const heroes = [
        { name: "ألكسندر", color: "#6366f1", jump: -12, speed: 7 },
        { name: "سارة", color: "#f43f5e", jump: -10, speed: 10 },
        { name: "ماكس", color: "#fbbf24", jump: -15, speed: 6 }
    ];

    let player = { x: 100, y: 350, w: 40, h: 40, dy: 0, onGround: false };
    let obstacles = [];
    let particles = [];

    function selectHero(idx) {
        game.selectedHero = idx;
        document.querySelectorAll('.hero-option').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        game.active = true;
        animate();
    }

    class Obstacle {
        constructor() {
            this.w = 40 + Math.random() * 30;
            this.h = 40 + Math.random() * 40;
            this.x = canvas.width + 100;
            this.y = canvas.height - 100 - this.h;
            this.speed = 6 + (game.level * 1.5);
            this.color = game.level === 1 ? '#475569' : '#991b1b';
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.shadowBlur = 0;
        }
        update() {
            this.x -= this.speed;
        }
    }

    function createParticles(x, y, color) {
        for(let i=0; i<10; i++) {
            particles.push({
                x, y, 
                vx: (Math.random()-0.5)*10, 
                vy: (Math.random()-0.5)*10, 
                life: 1, color
            });
        }
    }

    function animate() {
        if(!game.active) return;
        ctx.clearRect(0,0, canvas.width, canvas.height);

        // رسم الخلفية (Gradient)
        let grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grd.addColorStop(0, "#0f172a");
        grd.addColorStop(1, "#1e293b");
        ctx.fillStyle = grd; ctx.fillRect(0,0, canvas.width, canvas.height);

        // رسم الأرضية الحديثة
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

        // تحريك اللاعب
        player.dy += game.gravity;
        player.y += player.dy;
        if(player.y > canvas.height - 140) {
            player.y = canvas.height - 140;
            player.dy = 0;
            player.onGround = true;
        }

        // رسم اللاعب بتأثير Glow
        const hero = heroes[game.selectedHero];
        ctx.fillStyle = hero.color;
        ctx.shadowBlur = 20; ctx.shadowColor = hero.color;
        ctx.roundRect(player.x, player.y, player.w, player.h, 8);
        ctx.fill();
        ctx.shadowBlur = 0;

        // إدارة العقبات
        if(game.frame % Math.max(40, 100 - game.level*10) === 0) obstacles.push(new Obstacle());
        
        obstacles.forEach((obs, idx) => {
            obs.update();
            obs.draw();

            // تصادم
            if(player.x < obs.x + obs.w && player.x + player.w > obs.x &&
               player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                game.hp -= 20;
                document.getElementById('hp-val').innerText = game.hp;
                createParticles(player.x, player.y, "#ef4444");
                obstacles.splice(idx, 1);
                if(game.hp <= 0) endGame();
            }

            if(obs.x + obs.w < 0) {
                obstacles.splice(idx, 1);
                game.score += 10;
                document.getElementById('score-val').innerText = game.score;
                if(game.score % 100 === 0) {
                    game.level++;
                    document.getElementById('level-name').innerText = game.level === 2 ? "المنطقة البركانية" : "الفضاء العميق";
                }
            }
        });

        // تحريك الجزيئات (Particles)
        particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.fillStyle = `rgba(239, 68, 68, ${p.life})`;
            ctx.fillRect(p.x, p.y, 4, 4);
            if(p.life <= 0) particles.splice(idx, 1);
        });

        game.frame++;
        requestAnimationFrame(animate);
    }

    function endGame() {
        game.active = false;
        document.getElementById('over-screen').classList.remove('hidden');
        document.getElementById('over-msg').innerText = `لقد صمدت حتى المستوى ${game.level} وجمعت ${game.score} نقطة!`;
    }

    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space' && player.onGround) {
            player.dy = heroes[game.selectedHero].jump;
            player.onGround = false;
        }
    });

    // رسم مربع زواياه مستديرة (polyfill)
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
    }
</script>
</body>
</html>

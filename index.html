<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة الأبطال - المتجر والمتهمات</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; 
            align-items: center; height: 100vh; background-color: #0f172a; 
            font-family: 'Segoe UI', Tahoma, sans-serif; color: white; overflow: hidden;
        }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #334155; background: #87CEEB; border-radius: 12px; overflow: hidden; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        .menu-title { font-size: 32px; color: #fbbf24; margin-bottom: 20px; text-shadow: 2px 2px #000; }
        
        /* نظام البطاقات */
        .grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
        .card {
            background: #1e293b; border: 2px solid #475569; padding: 10px; border-radius: 10px;
            cursor: pointer; transition: 0.2s; text-align: center; width: 90px;
        }
        .card:hover { transform: translateY(-5px); border-color: #fbbf24; }
        .card.locked { opacity: 0.6; cursor: not-allowed; border-color: #ef4444; }
        .card.selected { border-color: #22c55e; background: #064e3b; }
        .char-box { width: 30px; height: 30px; margin: 0 auto 8px; border-radius: 4px; }

        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 10px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #22c55e; color: white; }
        .btn-mode { background: #334155; color: white; }
        .btn-mode.active { background: #f59e0b; }

        #hud {
            position: absolute; top: 10px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 5;
            font-size: 18px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 8px;
        }
        .price-tag { font-size: 12px; color: #fbbf24; display: block; margin-top: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- واجهة المعلومات أثناء اللعب -->
        <div id="hud">
            <div id="mission-info">الطور: لعب حر</div>
            <div>النقاط الحالية: <span id="current-score">0</span> | المحفظة: <span id="wallet">0</span></div>
        </div>

        <!-- القائمة الرئيسية -->
        <div id="main-menu" class="overlay">
            <h1 class="menu-title">متجر الأبطال</h1>
            
            <div class="grid" id="char-grid">
                <!-- الشخصيات ستضاف هنا بواسطة الجافاسكريبت -->
            </div>

            <div class="btn-group">
                <button class="btn-mode active" id="mode-free" onclick="setMode('free')">لعب حر</button>
                <button class="btn-mode" id="mode-task" onclick="setMode('task')">مهمة (15 نقطة)</button>
            </div>

            <button class="btn-primary" id="start-btn" onclick="launch()" style="margin-top: 20px; font-size: 20px;" disabled>إبدأ اللعب</button>
        </div>

        <!-- شاشة النتيجة -->
        <div id="end-screen" class="overlay hidden">
            <h1 id="end-title">انتهى الوقت!</h1>
            <p id="end-msg"></p>
            <button class="btn-primary" onclick="backToMenu()">العودة للمتجر</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // بيانات اللعبة
        let wallet = 0;
        let gameMode = 'free';
        let isRunning = false;
        let selectedChar = null;

        const characters = [
            { id: 0, name: 'السريع', color: '#22c55e', price: 0, locked: false },
            { id: 1, name: 'الغامض', color: '#a855f7', price: 0, locked: false },
            { id: 2, name: 'الناري', color: '#ef4444', price: 10, locked: true },
            { id: 3, name: 'الجليدي', color: '#3b82f6', price: 25, locked: true },
            { id: 4, name: 'الذهبي', color: '#eab308', price: 50, locked: true }
        ];

        let playState = { score: 0, frame: 0, obstacles: [], playerY: 300, dy: 0 };

        // بناء قائمة الشخصيات
        function renderStore() {
            const grid = document.getElementById('char-grid');
            grid.innerHTML = '';
            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = `card ${char.locked ? 'locked' : ''} ${selectedChar?.id === char.id ? 'selected' : ''}`;
                card.onclick = () => buyOrSelect(char);
                card.innerHTML = `
                    <div class="char-box" style="background: ${char.color}"></div>
                    <span>${char.name}</span>
                    <span class="price-tag">${char.locked ? 'قفل: ' + char.price : 'متاح'}</span>
                `;
                grid.appendChild(card);
            });
            document.getElementById('wallet').innerText = wallet;
        }

        function buyOrSelect(char) {
            if (char.locked) {
                if (wallet >= char.price) {
                    wallet -= char.price;
                    char.locked = false;
                    alert(`تم فتح ${char.name}!`);
                } else {
                    alert('ليس لديك نقاط كافية! العب "اللعب الحر" لجمع النقاط.');
                    return;
                }
            }
            selectedChar = char;
            document.getElementById('start-btn').disabled = false;
            renderStore();
        }

        function setMode(m) {
            gameMode = m;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + m).classList.add('active');
        }

        function launch() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            isRunning = true;
            playState = { score: 0, frame: 0, obstacles: [], playerY: 300, dy: 0 };
            document.getElementById('mission-info').innerText = gameMode === 'task' ? "المهمة: الوصول لـ 15 نقطة" : "الطور: لعب حر";
            loop();
        }

        function loop() {
            if (!isRunning) return;
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 340, canvas.width, 60); // الأرضية

            playState.frame++;
            
            // جاذبية اللاعب
            playState.dy += 0.8;
            playState.playerY += playState.dy;
            if (playState.playerY > 300) { playState.playerY = 300; playState.dy = 0; }

            // رسم اللاعب
            ctx.fillStyle = selectedChar.color;
            ctx.fillRect(80, playState.playerY, 40, 40);
            ctx.fillStyle = "white"; ctx.fillRect(105, playState.playerY + 8, 8, 8);

            // الوحوش
            if (playState.frame % 80 === 0) playState.obstacles.push({ x: 800 });

            for (let i = playState.obstacles.length - 1; i >= 0; i--) {
                playState.obstacles[i].x -= 8;
                
                // رسم وحش
                ctx.fillStyle = "#f43f5e";
                ctx.beginPath();
                ctx.moveTo(playState.obstacles[i].x, 340);
                ctx.lineTo(playState.obstacles[i].x + 20, 300);
                ctx.lineTo(playState.obstacles[i].x + 40, 340);
                ctx.fill();

                // تصادم
                if (80 < playState.obstacles[i].x + 30 && 120 > playState.obstacles[i].x &&
                    playState.playerY > 260) {
                    finish(false);
                }

                if (playState.obstacles[i].x < -40) {
                    playState.obstacles.splice(i, 1);
                    playState.score++;
                    document.getElementById('current-score').innerText = playState.score;
                    if (gameMode === 'task' && playState.score >= 15) finish(true);
                }
            }
            requestAnimationFrame(loop);
        }

        function finish(win) {
            isRunning = false;
            wallet += playState.score; // إضافة النقاط للمحفظة
            document.getElementById('end-screen').classList.remove('hidden');
            const title = document.getElementById('end-title');
            if(win) {
                title.innerText = "فوز ساحق!";
                title.style.color = "#22c55e";
            } else {
                title.innerText = "خسارة!";
                title.style.color = "#ef4444";
            }
            document.getElementById('end-msg').innerText = `جمعت ${playState.score} نقطة وتمت إضافتها لمحفظتك.`;
        }

        function backToMenu() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            renderStore();
        }

        window.onkeydown = (e) => {
            if (e.code === "Space" && playState.playerY === 300 && isRunning) {
                playState.dy = -15;
            }
        };

        // تشغيل المتجر عند التحميل
        renderStore();
    </script>
</body>
</html>

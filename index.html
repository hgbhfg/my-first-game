<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة الأبطال - العوالم المتعددة</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; 
            align-items: center; height: 100vh; background-color: #0f172a; 
            font-family: 'Segoe UI', Tahoma, sans-serif; color: white; overflow: hidden;
        }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #334155; border-radius: 12px; overflow: hidden; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        .menu-title { font-size: 28px; color: #fbbf24; margin-bottom: 15px; }
        
        .section-label { font-size: 14px; color: #94a3b8; margin: 10px 0; }
        
        .grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .card {
            background: #1e293b; border: 2px solid #475569; padding: 8px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; text-align: center; width: 80px; font-size: 12px;
        }
        .card:hover { border-color: #fbbf24; }
        .card.selected { border-color: #22c55e; background: #064e3b; }
        .box { width: 25px; height: 25px; margin: 0 auto 5px; border-radius: 4px; }

        .btn-primary { 
            margin-top: 20px; padding: 12px 50px; background: #22c55e; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 18px;
        }
        .btn-primary:disabled { background: #334155; cursor: not-allowed; }

        #hud {
            position: absolute; top: 10px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 5;
            background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 8px; font-size: 14px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div id="world-name">العالم: الغابة</div>
            <div>النقاط: <span id="current-score">0</span> | المحفظة: <span id="wallet">0</span></div>
        </div>

        <div id="main-menu" class="overlay">
            <h1 class="menu-title">تخصيص المغامرة</h1>
            
            <p class="section-label">1. اختر البطل:</p>
            <div class="grid" id="char-grid"></div>

            <p class="section-label">2. اختر العالم (المكان):</p>
            <div class="grid" id="world-grid">
                <div class="card world-card" onclick="selectWorld('forest', '#27ae60', '#87CEEB', 'الغابة')">
                    <div class="box" style="background: #27ae60"></div><span>الغابة</span>
                </div>
                <div class="card world-card" onclick="selectWorld('desert', '#f1c40f', '#edbd69', 'الصحراء')">
                    <div class="box" style="background: #f1c40f"></div><span>الصحراء</span>
                </div>
                <div class="card world-card" onclick="selectWorld('ice', '#ecf0f1', '#a2d9ff', 'الثلوج')">
                    <div class="box" style="background: #ecf0f1"></div><span>الثلوج</span>
                </div>
            </div>

            <button class="btn-primary" id="start-btn" onclick="launch()" disabled>انطلاق</button>
        </div>

        <div id="end-screen" class="overlay hidden">
            <h1 id="end-title">انتهت اللعبة</h1>
            <p id="end-msg"></p>
            <button class="btn-primary" onclick="backToMenu()">العودة للمتجر</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let wallet = 0;
        let isRunning = false;
        let selectedChar = null;
        let worldConfig = { id: 'forest', ground: '#27ae60', sky: '#87CEEB', name: 'الغابة' };

        const characters = [
            { id: 0, name: 'السريع', color: '#2ecc71', price: 0, locked: false },
            { id: 1, name: 'الغامض', color: '#9b59b6', price: 0, locked: false },
            { id: 2, name: 'الذهبي', color: '#f1c40f', price: 30, locked: true }
        ];

        let playState = { score: 0, frame: 0, obstacles: [], playerY: 300, dy: 0 };

        function renderStore() {
            const grid = document.getElementById('char-grid');
            grid.innerHTML = '';
            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = `card ${char.locked ? 'locked' : ''} ${selectedChar?.id === char.id ? 'selected' : ''}`;
                card.onclick = () => {
                    if (char.locked && wallet >= char.price) {
                        wallet -= char.price; char.locked = false;
                    } else if (char.locked) {
                        alert("تحتاج نقاط أكثر!"); return;
                    }
                    selectedChar = char;
                    checkStartReady();
                    renderStore();
                };
                card.innerHTML = `<div class="box" style="background:${char.color}"></div><span>${char.name}</span><br><small>${char.locked ? char.price : 'تم'}</small>`;
                grid.appendChild(card);
            });
            document.getElementById('wallet').innerText = wallet;
        }

        function selectWorld(id, ground, sky, name) {
            worldConfig = { id, ground, sky, name };
            document.querySelectorAll('.world-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            checkStartReady();
        }

        function checkStartReady() {
            if (selectedChar && worldConfig.id) document.getElementById('start-btn').disabled = false;
        }

        function launch() {
            document.getElementById('main-menu').classList.add('hidden');
            isRunning = true;
            playState = { score: 0, frame: 0, obstacles: [], playerY: 300, dy: 0 };
            document.getElementById('world-name').innerText = "العالم: " + worldConfig.name;
            loop();
        }

        function loop() {
            if (!isRunning) return;
            
            // رسم البيئة بناءً على العالم المختار
            ctx.fillStyle = worldConfig.sky; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = worldConfig.ground; ctx.fillRect(0, 340, canvas.width, 60);

            // تأثيرات العالم (مثل الثلوج)
            if (worldConfig.id === 'ice') {
                ctx.fillStyle = "white";
                for(let i=0; i<10; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }

            playState.frame++;
            playState.dy += (worldConfig.id === 'ice' ? 0.4 : 0.8); // جاذبية أقل في الثلج
            playState.playerY += playState.dy;
            if (playState.playerY > 300) { playState.playerY = 300; playState.dy = 0; }

            // رسم اللاعب
            ctx.fillStyle = selectedChar.color;
            ctx.fillRect(80, playState.playerY, 40, 40);

            // الوحوش (تغيير سرعتها حسب العالم)
            let speed = (worldConfig.id === 'desert' ? 10 : 7);
            if (playState.frame % 80 === 0) playState.obstacles.push({ x: 800 });

            for (let i = playState.obstacles.length - 1; i >= 0; i--) {
                playState.obstacles[i].x -= speed;
                
                // رسم الوحش بشكل مختلف لكل عالم
                ctx.fillStyle = (worldConfig.id === 'desert' ? '#e67e22' : '#c0392b');
                ctx.fillRect(playState.obstacles[i].x, 300, 40, 40);

                if (80 < playState.obstacles[i].x + 30 && 120 > playState.obstacles[i].x && playState.playerY > 260) {
                    isRunning = false;
                    wallet += playState.score;
                    document.getElementById('end-screen').classList.remove('hidden');
                    document.getElementById('end-msg').innerText = `جمعت ${playState.score} نقطة في ${worldConfig.name}.`;
                }

                if (playState.obstacles[i].x < -40) {
                    playState.obstacles.splice(i, 1);
                    playState.score++;
                    document.getElementById('current-score').innerText = playState.score;
                }
            }
            requestAnimationFrame(loop);
        }

        function backToMenu() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            renderStore();
        }

        window.onkeydown = (e) => {
            if (e.code === "Space" && playState.playerY === 300 && isRunning) playState.dy = -15;
        };

        renderStore();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة الأبطال - اختيار الشخصية</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; 
            align-items: center; height: 100vh; background-color: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; overflow: hidden;
        }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #444; background: #87CEEB; }
        canvas { display: block; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }

        h1 { font-size: 35px; color: #ffcc00; margin-bottom: 20px; }

        /* تنسيق اختيار الشخصيات */
        .char-select { display: flex; gap: 20px; margin-bottom: 30px; }
        .char-card {
            border: 3px solid #555; padding: 15px; border-radius: 10px;
            cursor: pointer; transition: 0.3s; text-align: center; width: 100px;
        }
        .char-card:hover { transform: scale(1.1); border-color: #ffcc00; }
        .char-card.selected { border-color: #28a745; background: rgba(40, 167, 69, 0.2); }
        
        .char-icon { width: 40px; height: 40px; margin: 0 auto 10px; }
        
        button {
            padding: 12px 40px; font-size: 22px; cursor: pointer;
            background-color: #28a745; color: white; border: none; border-radius: 8px;
        }
        button:disabled { background-color: #555; cursor: not-allowed; }

        #score-tag {
            position: absolute; top: 15px; right: 20px; font-size: 22px;
            z-index: 5; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 5px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-tag">النقاط: 0</div>

        <!-- واجهة البداية واختيار الشخصيات -->
        <div id="start-screen" class="overlay">
            <h1>اختر بطلـك</h1>
            <div class="char-select">
                <div class="char-card" onclick="selectChar('green', '#2ecc71', 'البطل السريع')">
                    <div class="char-icon" style="background: #2ecc71;"></div>
                    <span>السريع</span>
                </div>
                <div class="char-card" onclick="selectChar('purple', '#9b59b6', 'البطل القوي')">
                    <div class="char-icon" style="background: #9b59b6;"></div>
                    <span>القوي</span>
                </div>
                <div class="char-card" onclick="selectChar('orange', '#e67e22', 'البطل الناري')">
                    <div class="char-icon" style="background: #e67e22;"></div>
                    <span>الناري</span>
                </div>
            </div>
            <button id="start-btn" onclick="startGame()" disabled>ابدأ المغامرة</button>
        </div>

        <!-- واجهة النهاية -->
        <div id="game-over-screen" class="overlay hidden">
            <h1>انتهت الرحلة!</h1>
            <p id="final-score">نقاطك: 0</p>
            <button onclick="showStartScreen()">العودة للقائمة</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let gameRunning = false;
        let score = 0;
        let frame = 0;
        let obstacles = [];
        let selectedColor = '';
        
        let player = { x: 80, y: 300, w: 40, h: 40, dy: 0, jump: -15, grav: 0.8, grounded: false, color: '#fff' };

        function selectChar(id, color, name) {
            selectedColor = color;
            player.color = color;
            // تحديث شكل البطاقات
            document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            // تفعيل زر البداية
            document.getElementById('start-btn').disabled = false;
        }

        function showStartScreen() {
            document.getElementById("game-over-screen").classList.add("hidden");
            document.getElementById("start-screen").classList.remove("hidden");
            document.getElementById('start-btn').disabled = true;
            document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected'));
        }

        function startGame() {
            document.getElementById("start-screen").classList.add("hidden");
            score = 0;
            obstacles = [];
            player.y = 300;
            player.dy = 0;
            frame = 0;
            gameRunning = true;
            document.getElementById("score-tag").innerText = "النقاط: 0";
            update();
        }

        function drawPlayer(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 40, 40);
            // تفاصيل الشخصية (عين وفم)
            ctx.fillStyle = "white";
            ctx.fillRect(x + 25, y + 5, 10, 10);
            ctx.fillStyle = "black";
            ctx.fillRect(x + 30, y + 8, 5, 5);
            ctx.fillRect(x + 20, y + 25, 15, 3); 
        }

        function drawMonster(x, y) {
            ctx.fillStyle = "#e74c3c"; // وحش أحمر
            ctx.beginPath();
            ctx.moveTo(x, y + 40);
            ctx.lineTo(x + 20, y);
            ctx.lineTo(x + 40, y + 40);
            ctx.fill();
            // عين الوحش
            ctx.fillStyle = "yellow";
            ctx.beginPath();
            ctx.arc(x + 20, y + 25, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            if (!gameRunning) return;

            // مسح ورسم البيئة
            ctx.fillStyle = "#87CEEB"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#2c3e50"; // أرضية مظلمة
            ctx.fillRect(0, 340, canvas.width, 60);

            frame++;

            // حركة الجاذبية
            player.dy += player.grav;
            player.y += player.dy;

            if (player.y > 300) {
                player.y = 300;
                player.dy = 0;
                player.grounded = true;
            }

            drawPlayer(player.x, player.y, player.color);

            // إنشاء العقبات
            if (frame % 80 === 0) {
                obstacles.push({ x: canvas.width, y: 300 });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= 8;
                drawMonster(obstacles[i].x, obstacles[i].y);

                // فحص التصادم
                if (player.x < obstacles[i].x + 30 && player.x + 30 > obstacles[i].x &&
                    player.y < obstacles[i].y + 30 && player.y + 30 > obstacles[i].y) {
                    gameRunning = false;
                    document.getElementById("game-over-screen").classList.remove("hidden");
                    document.getElementById("final-score").innerText = "نقاطك: " + score;
                }

                // حذف العقبات وزيادة النقاط
                if (obstacles[i].x < -40) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById("score-tag").innerText = "النقاط: " + score;
                }
            }

            requestAnimationFrame(update);
        }

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && player.grounded && gameRunning) {
                player.dy = player.jump;
                player.grounded = false;
            }
        });
    </script>
</body>
</html>

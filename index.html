<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة الأبطال - طور المهمات</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; 
            align-items: center; height: 100vh; background-color: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, sans-serif; color: white; overflow: hidden;
        }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #444; background: #87CEEB; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        .menu-grid { display: flex; gap: 20px; margin-bottom: 20px; }
        .card {
            border: 2px solid #555; padding: 10px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; text-align: center; width: 120px;
        }
        .card:hover { transform: scale(1.05); border-color: #ffcc00; }
        .selected { border-color: #28a745 !important; background: rgba(40, 167, 69, 0.1); }
        
        .mode-select { margin-top: 10px; display: flex; gap: 10px; }
        .mode-btn { background: #444; border: none; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .mode-btn.active { background: #e67e22; }

        button#start-btn {
            margin-top: 20px; padding: 12px 50px; font-size: 20px; 
            background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;
        }
        #status-bar {
            position: absolute; top: 10px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 5;
            font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 5px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="status-bar">
            <div id="mission-text">الطور: لعب حر</div>
            <div id="score-text">النقاط: 0</div>
        </div>

        <!-- القائمة الرئيسية -->
        <div id="main-menu" class="overlay">
            <h1>مغامرة الأبطال</h1>
            
            <p>1. اختر البطل:</p>
            <div class="menu-grid">
                <div class="card char-card" onclick="selectChar('#2ecc71', 'السريع')">
                    <div style="width:30px; height:30px; background:#2ecc71; margin:0 auto 5px;"></div>
                    <span>السريع</span>
                </div>
                <div class="card char-card" onclick="selectChar('#9b59b6', 'القوي')">
                    <div style="width:30px; height:30px; background:#9b59b6; margin:0 auto 5px;"></div>
                    <span>القوي</span>
                </div>
            </div>

            <p>2. اختر طور اللعب:</p>
            <div class="mode-select">
                <button class="mode-btn active" id="btn-endless" onclick="selectMode('endless')">لعب حر</button>
                <button class="mode-btn" id="btn-mission" onclick="selectMode('mission')">المهمات</button>
            </div>

            <button id="start-btn" onclick="initGame()" disabled>انطلاق!</button>
        </div>

        <!-- شاشة النتيجة -->
        <div id="result-screen" class="overlay hidden">
            <h1 id="result-title">انتهت اللعبة</h1>
            <p id="result-desc"></p>
            <button onclick="location.reload()">العودة للقائمة</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let state = {
            running: false,
            mode: 'endless', // 'endless' or 'mission'
            score: 0,
            frame: 0,
            speed: 7,
            target: 0,
            player: { x: 80, y: 300, w: 40, h: 40, dy: 0, jump: -15, grav: 0.8, color: '#fff', grounded: false },
            obstacles: []
        };

        function selectChar(color, name) {
            state.player.color = color;
            document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById('start-btn').disabled = false;
        }

        function selectMode(m) {
            state.mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + m).classList.add('active');
        }

        function initGame() {
            document.getElementById('main-menu').classList.add('hidden');
            state.running = true;
            state.score = 0;
            state.frame = 0;
            state.obstacles = [];
            
            if(state.mode === 'mission') {
                state.target = 10; // مهمة: القفز فوق 10 وحوش للفوز
                state.speed = 8;
                document.getElementById('mission-text').innerText = "المهمة: اقفز فوق 10 وحوش";
            } else {
                state.target = Infinity;
                state.speed = 7;
                document.getElementById('mission-text').innerText = "الطور: لعب حر (لانهائي)";
            }
            animate();
        }

        function drawActor(x, y, color, isMonster = false) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 40, 40);
            if(!isMonster) { // تفاصيل اللاعب
                ctx.fillStyle = "white"; ctx.fillRect(x + 25, y + 5, 8, 8);
            } else { // تفاصيل الوحش
                ctx.fillStyle = "yellow"; ctx.fillRect(x + 5, y + 5, 5, 5);
                ctx.fillRect(x + 30, y + 5, 5, 5);
            }
        }

        function animate() {
            if (!state.running) return;

            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#34495e"; ctx.fillRect(0, 340, canvas.width, 60);

            state.frame++;

            // جاذبية اللاعب
            state.player.dy += state.player.grav;
            state.player.y += state.player.dy;
            if (state.player.y > 300) { state.player.y = 300; state.player.dy = 0; state.player.grounded = true; }

            drawActor(state.player.x, state.player.y, state.player.color);

            // الوحوش
            if (state.frame % 70 === 0) state.obstacles.push({ x: 800, y: 300 });

            for (let i = state.obstacles.length - 1; i >= 0; i--) {
                state.obstacles[i].x -= state.speed;
                drawActor(state.obstacles[i].x, state.obstacles[i].y, "#c0392b", true);

                // تصادم
                if (state.player.x < state.obstacles[i].x + 30 && state.player.x + 30 > state.obstacles[i].x &&
                    state.player.y < state.obstacles[i].y + 30 && state.player.y + 30 > state.obstacles[i].y) {
                    endGame(false);
                }

                if (state.obstacles[i].x < -40) {
                    state.obstacles.splice(i, 1);
                    state.score++;
                    document.getElementById('score-text').innerText = "النقاط: " + state.score;
                    
                    // تحقق من الفوز بالمهمة
                    if (state.score >= state.target) endGame(true);
                }
            }
            requestAnimationFrame(animate);
        }

        function endGame(isWin) {
            state.running = false;
            const screen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            
            screen.classList.remove('hidden');
            if (isWin) {
                title.innerText = "مبروك! تم إنجاز المهمة";
                title.style.color = "#2ecc71";
                desc.innerText = "لقد أثبت أنك بطل حقيقي.";
            } else {
                title.innerText = "حاول مرة أخرى";
                title.style.color = "#e74c3c";
                desc.innerText = "الوحوش كانت أسرع هذه المرة.";
            }
        }

        window.onkeydown = (e) => {
            if (e.code === "Space" && state.player.grounded && state.running) {
                state.player.dy = state.player.jump;
                state.player.grounded = false;
            }
        };
    </script>
</body>
</html>
